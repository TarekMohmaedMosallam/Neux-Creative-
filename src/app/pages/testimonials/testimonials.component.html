


<section>
<div class="container mt-md-4 ">
  <h2 class="text-center form-control-plaintext text-black mb-md-2" style="font-size: 25px;">
    What Our Clients Say
  </h2>
  <div class="line mb-3"></div>
</div>

<div class="container mt-lg-5">
  <div class="row justify-content-center ">
    <div class="col-12 col-md-6 col-lg-4 mb-4" *ngFor="let item of data">

      <div class="card border border-1 shadow p-3 bg-body rounded h-100" style="transition: none; transform: none;">
        <div class="card-body d-flex flex-column">

          <p style="font-size: 14px;">{{item.comment}}</p>

          <div class="mt-auto">
            <p style="font-size: 13px;" class="card-text fw-bold mb-0">
              {{item.name}}
            </p>
            <p style="font-size: 12px;" class="card-text text-muted">
              {{item.job}}
            </p>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

</section>
