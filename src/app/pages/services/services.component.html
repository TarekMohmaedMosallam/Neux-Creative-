  <div class="container mt-md-4 ">
    <h2 class="text-center form-control-plaintext text-black mb-md-5" style="font-size: 25px;">Services</h2>
    <div class="line mb-3"></div>
  </div>
  <div class="container mt-lg-5">
    <div class="row justify-content-center ">
      <div class="col-12 col-md-6 col-lg-4 mb-4  " *ngFor="let item of data">
        <div class="card border border-2 shadow p-3 bg-body rounded h-100">
          <div class="card-body d-flex flex-column align-items-center text-center">
            <span  style="color: #ffcc00;" [innerHTML]="item.icon"></span>
            <p class="card-text  fw-bold mt-2">{{item.middleText}}</p>
            <p class="card-text ">{{item.endText}}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
