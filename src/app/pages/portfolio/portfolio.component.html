  <div class="container mt-md-2 ">
    <h2 class="text-center form-control-plaintext text-black mb-md-3" style="font-size: 25px;">Our Portfolio</h2>
    <div class="line mb-3"></div>
  </div>
<div class="container mt-lg-4">
  <div class="row justify-content-center">

    <div class="col-12 col-md-6 col-lg-4 mb-4 " *ngFor="let item of data">

      <div class="wrapper  d-flex flex-column align-items-center text-center">
        <div class="overflow-hidden rounded-2 w-100">
          <img class="image w-100" [src]="item.imageLink" alt="">
        </div>

        <div class="contect">
          <p style="color:#ffcc00 ; font-weight: bold;">{{item.title}}</p>
          <p style="font-size: 14px;" [innerHTML]="item.text"></p>
        </div>
      </div>

    </div>

  </div>
</div>
